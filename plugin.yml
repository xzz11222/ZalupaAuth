name: ZalupaAuth
main: zalupaauth\Main
version: 1.0.0
api: 5.0.0
author: xzz11222
license: Custom
description: Auth plugin with forms, RU/EN support, trusted sessions, and temporary anti-bruteforce protection.

commands:
  register:
    description: Register an account
    usage: "/register <password> <password>"
    aliases: ["reg"]
    permission: zalupaauth.command.register

  login:
    description: Log into an account
    usage: "/login <password>"
    aliases: ["l", "log"]
    permission: zalupaauth.command.login

  passreset:
    description: Reset a player's password
    usage: "/passreset <name> <password>"
    permission: zalupaauth.command.passreset

permissions:
  zalupaauth.command.register:
    default: true
  zalupaauth.command.login:
    default: true
  zalupaauth.command.passreset:
    default: op
